<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite Login</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">QuickBite</div>
    </nav>

    <main class="container login-container">
        <section class="login-card">
            <h2>Sign In</h2>
            <form id="login-form" class="login-form" action="home.html" method="get" novalidate>
                <div class="form-group">
                    <label for="username">User Name</label>
                    <input type="text" id="username" name="username" placeholder="Enter your user name" aria-describedby="login-error">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" aria-describedby="login-error">
                </div>
                <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
                <button type="submit" class="btn-primary btn-block">Sign In</button>
            </form>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
